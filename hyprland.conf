# =============================================================================
# HYPRLAND CONFIGURATION (Official Syntax)
# Optimized for Lenovo ThinkPad E14 Gen 7 (AMD)
# =============================================================================

# -----------------------------------------------------------------------------
# 1. Hardware & Environment Initialization
# -----------------------------------------------------------------------------
env = LIBVA_DRIVER_NAME,radeonsi
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# -----------------------------------------------------------------------------
# 2. Monitor Setup & Screen Scaling
# -----------------------------------------------------------------------------
monitor = eDP-1, preferred, auto, 1.25
monitor = , preferred, auto, 1.00

# -----------------------------------------------------------------------------
# 3. Automatic Startup Daemons
# -----------------------------------------------------------------------------
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprpolkitagent
exec-once = hyprlauncher -d

# -----------------------------------------------------------------------------
# 4. Desktop Configuration Matrix
# -----------------------------------------------------------------------------
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap_to_click = true
        disable_while_typing = true
    }
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 6
    blur {
        enabled = false # Battery saving optimization
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = workspaces, 1, 4, default
}

# -----------------------------------------------------------------------------
# 5. Core Keybindings & ThinkPad Hardware Keys
# -----------------------------------------------------------------------------
$mainMod = SUPER

bind = $mainMod, Q, exec, kitty
bind = $mainMod, R, exec, hyprlauncher --toggle
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, V, togglefloating,

# Vim Navigation Movement Keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Workspace Navigation Loop (1-5)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Audio Mapping (Fn Buttons)
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

# Screen Brightness Mapping (Fn Buttons)
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
